<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 231" width="200" height="231" role="img" aria-label="punycoder hex logo">
  <defs>
    <clipPath id="hex">
      <path d="M100 2 L196 58 L196 173 L100 229 L4 173 L4 58 Z"/>
    </clipPath>
  </defs>
  <!-- hex fill -->
  <path d="M100 2 L196 58 L196 173 L100 229 L4 173 L4 58 Z" fill="#0E2A33"/>
  <!-- subtle inner gradient band -->
  <g clip-path="url(#hex)">
    <rect x="0" y="0" width="200" height="231" fill="#0E2A33"/>
    <rect x="0" y="150" width="200" height="81" fill="#0B222A"/>
  </g>
  <!-- accent border -->
  <path d="M100 2 L196 58 L196 173 L100 229 L4 173 L4 58 Z" fill="none" stroke="#2EC4B6" stroke-width="7"/>
  <!-- Unicode-to-ASCII motif -->
  <text x="100" y="92" text-anchor="middle" font-family="'DejaVu Sans','Helvetica Neue',Arial,sans-serif" font-size="30" fill="#9CE8E0">café</text>
  <text x="100" y="118" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" fill="#2EC4B6">&#8595;</text>
  <!-- wordmark -->
  <text x="100" y="150" text-anchor="middle" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,Consolas,monospace" font-size="34" font-weight="700" fill="#FFFFFF">xn--</text>
  <!-- package name -->
  <text x="100" y="196" text-anchor="middle" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,Consolas,monospace" font-size="19" letter-spacing="1.5" fill="#2EC4B6">punycoder</text>
</svg>
