# Fast verification gate: lint + a single Ubuntu R CMD check, on every push to
# main and every PR. Full cross-platform coverage lives in full-check.yml.
name: Verify

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions: read-all

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      LINTR_ERROR_ON_LINT: true
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::lintr
      - name: Lint
        run: lintr::lint_package()
        shell: Rscript {0}

  readme:
    runs-on: ubuntu-latest
    name: README in sync with README.Rmd
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      # The libidn2 backend is optional here; build_readme() installs the
      # package and the README's live `library(punycoder)` chunk runs against
      # the fallback backend, which keeps this job free of system deps.
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # devtools::build_readme() installs the package (the README has a live
          # `library(punycoder)` chunk) and renders README.Rmd.
          extra-packages: any::devtools
          needs: check
      - name: Re-render README.md from README.Rmd
        run: devtools::build_readme()
        shell: Rscript {0}
      - name: Fail if README.md is out of date
        run: |
          if ! git diff --exit-code -- README.md; then
            echo "::error file=README.md::README.md is out of sync with README.Rmd. Run devtools::build_readme() and commit the result."
            exit 1
          fi

  check:
    needs: lint
    runs-on: ubuntu-latest
    name: R CMD check (ubuntu-latest, release)
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4
      # Install the optional libidn2 backend so the native path and the
      # libidn2-vs-fallback parity tests exercise on CI.
      - name: Install libidn2 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libidn2-0-dev pkg-config
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check
      - uses: r-lib/actions/check-r-package@v2
        with:
          # Fast gate runs a standard check; the strict --as-cran pass lives in
          # full-check.yml (and the local pre-push hook).
          args: '"--no-manual"'
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'

  coverage:
    needs: check
    runs-on: ubuntu-latest
    name: Test coverage
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      # The libidn2 backend is optional for coverage; covr exercises the
      # fallback path, which keeps the coverage job free of system deps.
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr, any::xml2
          needs: coverage
      - name: Measure coverage
        run: |
          cov <- covr::package_coverage(quiet = FALSE)
          covr::to_cobertura(cov)
        shell: Rscript {0}
      - uses: codecov/codecov-action@v5
        with:
          files: ./cobertura.xml
          token: ${{ secrets.CODECOV_TOKEN }}
